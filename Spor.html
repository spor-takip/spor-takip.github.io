<body class="min-h-screen bg-gray-50 text-gray-800 font-sans">

    <div id="app"></div>

    <script>
        // --- İKONLAR ---
        const icons = {

            activity: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`,

            upload: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            clock: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            settings: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
            x: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            bracket: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v6h6"/><path d="M3 15v6h6"/><path d="M9 6h6v12H9"/><path d="M15 12h6"/></svg>`,
            pdf: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M10 12v6"/><path d="M8 14h4"/><path d="M16 18v-6a2 2 0 0 0-2-2h-2"/></svg>`
        };

        const SPORTS = {
            BASKETBOL_ERKEK: { id: 'basketbol_erkek', name: 'Basketbol Erkek', icon: icons.dribbble, color: 'bg-orange-600', unit: 'Sayı', desc: 'G: 2, M: 1 Puan' },
            BASKETBOL_KADIN: { id: 'basketbol_kadin', name: 'Basketbol Kadın', icon: icons.dribbble, color: 'bg-orange-500', unit: 'Sayı', desc: 'G: 2, M: 1 Puan' },
            VOLEYBOL_ERKEK: { id: 'voleybol_erkek', name: 'Voleybol Erkek', icon: icons.users, color: 'bg-blue-600', unit: 'Set', desc: '3-0/3-1: (3p), 3-2: (2p-1p)' },
            VOLEYBOL_KADIN: { id: 'voleybol_kadin', name: 'Voleybol Kadın', icon: icons.users, color: 'bg-blue-500', unit: 'Set', desc: '3-0/3-1: (3p), 3-2: (2p-1p)' }
        };

        const INITIAL_TEAMS = [
            { id: 1, name: 'MUĞLA MYO', group: 'A', manager: '', coach: '' }, 
            { id: 2, name: 'ULA MYO', group: 'A', manager: '', coach: '' },
            { id: 21, name: 'FEN EDEBİYAT', group: 'B', manager: '', coach: '' },
            { id: 22, name: 'GÜZEL SANATLAR', group: 'B', manager: '', coach: '' },
            { id: 7, name: 'İİBF', group: 'C', manager: '', coach: '' }, 
            { id: 12, name: 'SAĞLIK BİLİMLERİ FAK.', group: 'D', manager: '', coach: '' }
        ];

        // BOŞ ELEME AĞACI YAPISI
        const DEFAULT_KNOCKOUT = {
            qf: [{id: 'q1', h: '', a: '', hs: '', as: ''}, {id: 'q2', h: '', a: '', hs: '', as: ''}, {id: 'q3', h: '', a: '', hs: '', as: ''}, {id: 'q4', h: '', a: '', hs: '', as: ''}],
            sf: [{id: 's1', h: '', a: '', hs: '', as: ''}, {id: 's2', h: '', a: '', hs: '', as: ''}],
            f: [{id: 'f1', h: '', a: '', hs: '', as: ''}]
        };

        let state = {
            currentView: 'dashboard', 
            isLoggedIn: false,
            activeSport: 'basketbol_erkek',
            showMatchForm: false, 
            activeCardMatchId: null,
            predefinedTeams: { basketbol: [], voleybol: [] },
            leagues: {
                basketbol_erkek: { teams: [...INITIAL_TEAMS], fixtures: [], knockouts: JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT)), isStarted: false, isPlanning: false },
                basketbol_kadin: { teams: [], fixtures: [], knockouts: JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT)), isStarted: false, isPlanning: false },
                voleybol_erkek: { teams: [], fixtures: [], knockouts: JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT)), isStarted: false, isPlanning: false },
                voleybol_kadin: { teams: [], fixtures: [], knockouts: JSON.parse(JSON.stringify(DEFAULT_KNOCKOUT)), isStarted: false, isPlanning: false }
            }
        };

        // --- YARDIMCI FONKSİYONLAR ---
        function getTeam(id, leagueType) {
            return state.leagues[leagueType].teams.find(t => t.id == id) || { name: 'Seçilmedi', group: '?', manager: '', coach: '' };
        }

        function parseFlexibleDate(dateStr) {
            if (!dateStr) return new Date('');
            if (!isNaN(dateStr) && parseInt(dateStr, 10) > 30000) {
                const excelEpoch = new Date(1899, 11, 30);
                return new Date(excelEpoch.getTime() + parseInt(dateStr, 10) * 86400000);
            }
            const parts = dateStr.trim().split(/[\.\-\/]/);
            if (parts.length === 3) {
                let day, month, year;
                if (parts[0].length === 4) {
                    year = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; day = parseInt(parts[2], 10);
                } else {
                    day = parseInt(parts[0], 10); month = parseInt(parts[1], 10) - 1; year = parseInt(parts[2], 10);
                    if (year < 100) year += 2000;
                }
                const parsed = new Date(year, month, day);
                if (!isNaN(parsed)) return parsed;
            }
            return new Date(dateStr);
        }

        function parseFlexibleTime(timeStr) {
            if (!timeStr) return '14:00';
            timeStr = timeStr.toString().trim();
            if (!isNaN(timeStr) && timeStr.includes('.')) {
                const fraction = parseFloat(timeStr);
                if (fraction >= 0 && fraction < 1) {
                    const totalMinutes = Math.round(fraction * 24 * 60);
                    const h = Math.floor(totalMinutes / 60) % 24;
                    const m = totalMinutes % 60;
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                }
            }
            const ampmMatch = timeStr.match(/(\d{1,2})[:\.]?(\d{2})?\s*([AP]M)/i);
            if (ampmMatch) {
                let h = parseInt(ampmMatch[1], 10);
                const m = ampmMatch[2] || '00';
                const modifier = ampmMatch[3].toUpperCase();
                if (h === 12) h = 0;
                if (modifier === 'PM') h += 12;
                return `${String(h).padStart(2, '0')}:${m}`;
            }
            const timeMatch = timeStr.match(/(\d{1,2})[:\.](\d{2})/);
            if (timeMatch) {
                return `${String(timeMatch[1]).padStart(2, '0')}:${timeMatch[2]}`;
            }
            const hourMatch = timeStr.match(/^(\d{1,2})$/);
            if (hourMatch) {
                 const h = parseInt(hourMatch[1], 10);
                 if (h >= 0 && h < 24) return `${String(h).padStart(2, '0')}:00`;
            }
            return '14:00';
        }

        function sortFixturesByDate(fixtures) {
            // Önce turları tarihlere göre sırala
            fixtures.sort((a, b) => parseFlexibleDate(a.date) - parseFlexibleDate(b.date));
            
            // Sonra her turun içindeki maçları (aynı gün içindeki maçlar) saatine göre sırala
            fixtures.forEach(round => {
                if(round.matches) {
                    round.matches.sort((m1, m2) => {
                        const t1 = m1.time || "00:00";
                        const t2 = m2.time || "00:00";
                        return t1.localeCompare(t2);
                    });
                }
            });
            return fixtures;
        }

        function formatDateToLeagueString(dateObj) {
            const dayNames = ['PAZAR', 'PAZARTESİ', 'SALI', 'ÇARŞAMBA', 'PERŞEMBE', 'CUMA', 'CUMARTESİ'];
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            const dayName = dayNames[dateObj.getDay()];
            return `${day}.${month}.${year} ${dayName}`;
        }

        function setActiveSport(sportId) {
            state.activeSport = sportId;
            render();
        }

        function toggleMatchForm() {
            state.showMatchForm = !state.showMatchForm;
            render();
        }

        function toggleView(view) {
            state.currentView = view;
            render();
        }

        function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if(user === 'admin' && pass === '1234') {
                state.isLoggedIn = true;
                render();
            } else {
                alert('Hatalı kullanıcı adı veya şifre! (admin / 1234)');
            }
        }

        function logout() {
            state.isLoggedIn = false;
            state.currentView = 'dashboard';
            render();
        }

        // --- ÖN TANIMLI TAKIM FONKSİYONLARI ---
        function addPredefinedTeam(sport, inputId) {
            const val = document.getElementById(inputId).value.trim();
            if(!val) return;
            if(!state.predefinedTeams) state.predefinedTeams = { basketbol: [], voleybol: [] };
            
            if(!state.predefinedTeams[sport].includes(val)) {
                state.predefinedTeams[sport].push(val);
                render();
                setTimeout(() => {
                    const inputEl = document.getElementById(inputId);
                    if(inputEl) {
                        inputEl.value = '';
                        inputEl.focus();
                    }
                }, 50);
            } else {
                alert("Bu takım zaten listede mevcut.");
            }
        }

        function removePredefinedTeam(sport, index) {
            if(!state.predefinedTeams) state.predefinedTeams = { basketbol: [], voleybol: [] };
            state.predefinedTeams[sport].splice(index, 1);
            render();
        }

        function addTeam(inputId, groupSelectId, managerId, coachId) {
            const name = document.getElementById(inputId).value.trim();
            const group = document.getElementById(groupSelectId).value;
            const manager = document.getElementById(managerId)?.value.trim() || '';
            const coach = document.getElementById(coachId)?.value.trim() || '';

            if (!name) return;

            state.leagues[state.activeSport].teams.push({ id: Date.now(), name, group, manager, coach });
            
            const inputEl = document.getElementById(inputId);
            if(inputEl) inputEl.value = '';
            
            render();
        }

        function removeTeam(id) {
            if(!confirm('Bu takımı ve tüm verilerini silmek istediğinize emin misiniz?')) return;
            state.leagues[state.activeSport].teams = state.leagues[state.activeSport].teams.filter(t => t.id !== id);
            state.leagues[state.activeSport].fixtures.forEach(round => {
                round.matches = round.matches.filter(m => m.home.id !== id && m.away.id !== id);
            });
            render();
        }

        function removeFixtureMatch(matchId) {
            if(!confirm('Bu maçı fikstürden silmek istediğinize emin misiniz?')) return;
            const league = state.leagues[state.activeSport];
            league.fixtures.forEach(round => {
                round.matches = round.matches.filter(m => m.id !== matchId);
            });
            league.fixtures = league.fixtures.filter(round => round.matches.length > 0);
            render();
        }

        function addActiveMatch() {
            const league = state.leagues[state.activeSport];
            const rawDate = document.getElementById('activeDate').value;
            const timeRaw = document.getElementById('activeTime').value;
            const homeId = document.getElementById('activeHome').value;
            const awayId = document.getElementById('activeAway').value;

            // Eksik bilgi kontrolü ve hata mesajı
            if (!rawDate || !timeRaw || !homeId || !awayId) {
                alert("Lütfen tarih, saat, ev sahibi ve deplasman takımlarını eksiksiz doldurun!");
                return;
            }

            // Aynı takım seçildiyse uyarı ver
            if (homeId === awayId) {
                alert("Ev sahibi ve deplasman takımı aynı takım olamaz!");
                return;
            }

            const time = parseFlexibleTime(timeRaw);
            const dateStr = formatDateToLeagueString(new Date(rawDate));
            let roundObj = league.fixtures.find(r => r.date === dateStr);
            if (!roundObj) {
                roundObj = { round: league.fixtures.length + 1, date: dateStr, matches: [] };
                league.fixtures.push(roundObj);
            }

            roundObj.matches.push({
                id: Date.now().toString(), home: {id: homeId}, away: {id: awayId}, homeScore: '', awayScore: '', time: time, group: getTeam(homeId, state.activeSport).group, cards: []
            });

            sortFixturesByDate(league.fixtures);
            state.showMatchForm = false; 
            render();
        }

        function toggleCardForm(mId) {
            state.activeCardMatchId = (state.activeCardMatchId === mId) ? null : mId;
            render();
        }

        function addCardToMatch(mId) {
            const league = state.leagues[state.activeSport];
            let matchRef = null;
            league.fixtures.forEach(r => {
                const found = r.matches.find(m => m.id === mId);
                if(found) matchRef = found;
            });

            const teamId = document.getElementById(`cardTeamSelect_${mId}`).value;
            const playerName = document.getElementById(`cardPlayerInput_${mId}`).value.trim();

            if(!playerName || !matchRef) {
                alert("Lütfen oyuncu adını girin!");
                return;
            }

            if(!matchRef.cards) matchRef.cards = [];
            matchRef.cards.push({ id: Date.now(), teamId: teamId, playerName });
            state.activeCardMatchId = null;
            render();
        }

        function removeCardFromMatch(matchId, cardId) {
            const league = state.leagues[state.activeSport];
            league.fixtures.forEach(r => {
                const m = r.matches.find(match => match.id === matchId);
                if(m && m.cards) m.cards = m.cards.filter(c => c.id !== cardId);
            });
            render();
        }

        function updateScore(roundIndex, matchId, type, value) {
            const league = state.leagues[state.activeSport];
            const round = league.fixtures[roundIndex];
            if(!round) return;
            const match = round.matches.find(m => m.id === matchId);
            if (match) { match[type] = value; render(); }
        }

        // --- ELEME AĞACI GÜNCELLEME FONKSİYONLARI ---
        function updateKnockout(stage, index, field, value) {
            state.leagues[state.activeSport].knockouts[stage][index][field] = value;
            render();
        }

        // --- PDF İNDİRME FONKSİYONU ---
        function exportPDF() {
            const element = document.getElementById('pdf-content');
            if(!element) return;
            
            const opt = {
                margin:       [5, 5, 5, 5],
                filename:     `Turnuva_Raporu_${SPORTS[state.activeSport.toUpperCase()].name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }

        function calculateGroupStandings(targetGroup) {
            const currentLeague = state.leagues[state.activeSport];
            const stats = {};
            const groupTeams = currentLeague.teams.filter(t => t.group === targetGroup);
            
            groupTeams.forEach(team => {
                stats[team.id] = { id: team.id, name: team.name, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, gd: 0, points: 0, group: team.group, redCards: 0, manager: team.manager, coach: team.coach };
            });

            currentLeague.fixtures.forEach(round => {
                round.matches.forEach(match => {
                    if(match.cards) { match.cards.forEach(card => { if(stats[card.teamId]) stats[card.teamId].redCards++; }); }

                    if (match.homeScore !== '' && match.awayScore !== '') {
                        const hScore = parseFloat(match.homeScore);
                        const aScore = parseFloat(match.awayScore);
                        if (stats[match.home.id] && stats[match.away.id]) {
                            if(getTeam(match.home.id, state.activeSport).group === targetGroup || getTeam(match.away.id, state.activeSport).group === targetGroup) {
                                stats[match.home.id].played++; stats[match.away.id].played++;
                                stats[match.home.id].gf += hScore; stats[match.home.id].ga += aScore; stats[match.home.id].gd += (hScore - aScore);
                                stats[match.away.id].gf += aScore; stats[match.away.id].ga += hScore; stats[match.away.id].gd += (aScore - hScore);
                                
                                if (state.activeSport.includes('basketbol')) {
                                    if (hScore > aScore) { stats[match.home.id].won++; stats[match.home.id].points += 2; stats[match.away.id].lost++; stats[match.away.id].points += 1; }
                                    else if (aScore > hScore) { stats[match.away.id].won++; stats[match.away.id].points += 2; stats[match.home.id].lost++; stats[match.home.id].points += 1; }
                                    else { stats[match.home.id].drawn++; stats[match.home.id].points += 1; stats[match.away.id].drawn++; stats[match.away.id].points += 1; }
                                } else { 
                                    if (hScore > aScore) {
                                        stats[match.home.id].won++; stats[match.away.id].lost++;
                                        if (hScore === 3 && aScore < 2) { stats[match.home.id].points += 3; }
                                        else if (hScore === 3 && aScore === 2) { stats[match.home.id].points += 2; stats[match.away.id].points += 1; }
                                        else { stats[match.home.id].points += 3; }
                                    } else if (aScore > hScore) {
                                        stats[match.away.id].won++; stats[match.home.id].lost++;
                                        if (aScore === 3 && hScore < 2) { stats[match.away.id].points += 3; }
                                        else if (aScore === 3 && hScore === 2) { stats[match.away.id].points += 2; stats[match.home.id].points += 1; }
                                        else { stats[match.away.id].points += 3; }
                                    } else { stats[match.home.id].points += 1; stats[match.away.id].points += 1; }
                                }
                            }
                        }
                    }
                });
            });

            return Object.values(stats).sort((a, b) => b.points - a.points || b.gd - a.gd || b.gf - a.gf);
        }

                        </div>

                        <div class="flex gap-2 bg-white/10 p-1 rounded-lg">
                             <button onclick="toggleView('dashboard')" class="p-2 ${state.currentView === 'dashboard' ? 'bg-white text-gray-900' : 'text-white hover:bg-white/20'} rounded-md transition" title="Gruplar ve Fikstür">
                                ${icons.activity}
                             </button>
                             <button onclick="toggleView('knockout')" class="p-2 ${state.currentView === 'knockout' ? 'bg-white text-gray-900' : 'text-white hover:bg-white/20'} rounded-md transition" title="Eleme Aşaması (Final)">
                                ${icons.bracket}
                             </button>
                             <div class="w-px bg-white/30 my-1 mx-1"></div>
                             <button onclick="toggleView('settings')" class="p-2 ${state.currentView === 'settings' ? 'bg-white text-gray-900' : 'text-white hover:bg-white/20'} rounded-md transition" title="Ayarlar (Ön Tanımlı Takımlar)">
                                ${icons.settings}
                             </button>
                             <div class="w-px bg-white/30 my-1 mx-1"></div>
                             <button onclick="exportPDF()" class="p-2 text-white hover:bg-white/20 rounded-md transition flex items-center gap-1" title="Şu Anki Sayfayı PDF İndir">
                                ${icons.pdf} 
                             </button>
                             <button onclick="downloadData()" class="p-2 text-white hover:bg-white/20 rounded-md transition" title="Tüm Veriyi Yedekle (.json)">
                                ${icons.download}
                             </button>
                             <input type="file" id="upInput" class="hidden" onchange="uploadData(event)" accept=".json">
                             <button onclick="document.getElementById('upInput').click()" class="p-2 text-white hover:bg-white/20 rounded-md transition" title="Yedekten Yükle">
                                ${icons.upload}
                             </button>
                        </div>
                    </div>
                </div>
                <div class="max-w-7xl mx-auto p-4 md:p-6 pb-20">
            `;

            if (state.currentView === 'settings') {
                html += renderSettings();
            } else if (state.currentView === 'knockout') {
                html += renderKnockout();
            } else {
                const activeLeague = state.leagues[state.activeSport];
                if (!activeLeague.isStarted && activeLeague.fixtures.length === 0) {
                    if (state.isLoggedIn) {
                        html += `
                            <div class="bg-white rounded-xl shadow-md p-6 max-w-2xl mx-auto border fade-in">
                                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">${icons.users} Takım Kayıt (${currentSport.name})</h2>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                                    <input type="text" id="teamInput" list="teamDatalist" placeholder="Takım Adı Seç/Yaz" class="border rounded p-2 text-sm outline-none focus:ring-2 focus:ring-blue-400">
                                    <select id="groupSelect" class="border rounded p-2 text-sm bg-white">
                                        <option value="A">A Grubu</option><option value="B">B Grubu</option>
                                        <option value="C">C Grubu</option><option value="D">D Grubu</option>
                                    </select>
                                    <input type="text" id="managerInput" placeholder="Yönetici" class="border rounded p-2 text-sm outline-none">
                                    <input type="text" id="coachInput" placeholder="Antrenör" class="border rounded p-2 text-sm outline-none">
                                </div>
                                <button onclick="addTeam('teamInput', 'groupSelect', 'managerInput', 'coachInput')" class="w-full bg-blue-600 text-white py-2 rounded font-bold mb-6 hover:bg-blue-700 transition">+ Takım Ekle</button>
                                <div class="space-y-2 mb-6 max-h-60 overflow-y-auto custom-scrollbar">
                                    ${activeLeague.teams.map(t => `<div class="flex justify-between p-2 bg-gray-50 border rounded text-xs"><span>[${t.group}] <b>${t.name}</b></span><button onclick="removeTeam(${t.id})" class="text-red-500">${icons.trash}</button></div>`).join('')}
                                </div>
                                <button onclick="state.leagues[state.activeSport].isStarted=true; render();" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-green-700 transition">Ligi Başlat</button>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="bg-white rounded-xl shadow-md p-12 max-w-2xl mx-auto border text-center fade-in mt-8">
                                <div class="w-20 h-20 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-6">${icons.trophy}</div>
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">Lig Henüz Başlamadı</h2>
                                <p class="text-gray-500 italic">Takımlar ve fikstür kesinleştiğinde veriler burada yayınlanacaktır.</p>
                            </div>
                        `;
                    }
                } else {
                    html += renderDashboard();
                }
            }

            html += `</div>`;
            app.innerHTML = html;
        }

        function downloadData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const node = document.createElement('a');
            node.setAttribute("href", dataStr); node.setAttribute("download", "spor_ligi_2026.json");
            document.body.appendChild(node); node.click(); node.remove();
        }

        function uploadData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    if (json.leagues) { state = json; render(); alert('Sistem Yedeği Yüklendi!'); }
                } catch (er) { alert('Hata: Lütfen geçerli bir yedek dosyası (.json) seçin!'); }
            };
            reader.readAsText(file);
        }

        render();
    </script>
</body>
</html>
